  <main id="main-content">
    <section class="hero" aria-labelledby="hero-title">
      <div class="eyebrow reveal reveal-one">
        <span class="eyebrow-dot"></span>
        <span data-i18n="hero.eyebrow"></span>
      </div>
      <h1 id="hero-title" class="reveal reveal-two">
        <span class="hero-title-primary" data-i18n="hero.titleLine1"></span><br />
        <span class="hero-title-accent" data-i18n="hero.titleLine2"></span>
      </h1>
      <p class="hero-copy reveal reveal-three" data-i18n="hero.description"></p>

      <div class="scanner-shell reveal reveal-four">
        <form id="inspect-form" novalidate>
          <div class="url-field">
            <svg aria-hidden="true"><use href="#icon-link"></use></svg>
            <label class="sr-only" for="url" data-i18n="hero.urlLabel"></label>
            <input id="url" name="url" type="url" inputmode="url" autocomplete="url" data-i18n-placeholder="hero.urlPlaceholder" required />
          </div>
          <button id="scan-button" class="primary-button scan-button" type="submit">
            <span class="button-content">
              <svg aria-hidden="true"><use href="#icon-scan"></use></svg>
              <span class="button-label" data-i18n="hero.scan"></span>
            </span>
            <span class="button-loader" aria-hidden="true"></span>
          </button>
        </form>

        <div id="scan-loading" class="scan-loading" hidden aria-hidden="true">
          <div class="scan-track"><span></span></div>
          <div class="scan-state">
            <span class="spinner"></span>
            <span data-i18n="hero.scanning"></span>
            <span class="loading-dots"><i></i><i></i><i></i></span>
          </div>
        </div>
      </div>

      <div id="status" class="status-message" role="status" aria-live="polite" hidden></div>

      <section id="result" class="result-card" hidden aria-labelledby="title">
        <div class="media-preview">
          <div class="thumbnail-wrap">
            <div class="thumbnail-skeleton" aria-hidden="true"></div>
            <img id="thumbnail" alt="" />
            <div class="preview-badges">
              <span id="platform-badge" class="media-badge platform-badge" data-i18n="result.media"></span>
              <span id="resolution-badge" class="media-badge" data-i18n="result.autoQuality"></span>
            </div>
            <span id="duration-badge" class="duration-badge">--</span>
          </div>
        </div>

        <div class="result-content">
          <div class="result-heading">
            <span class="result-kicker" data-i18n="result.ready"></span>
            <h2 id="title" data-i18n="result.untitled"></h2>
          </div>

          <div class="media-facts">
            <div class="media-fact">
              <span data-i18n="result.creator"></span>
              <strong id="creator" data-i18n="result.publicCreator"></strong>
            </div>
            <div class="media-fact">
              <span data-i18n="result.fileSize"></span>
              <strong id="file-size" data-i18n="result.calculatedOnDownload"></strong>
            </div>
          </div>
          <p id="meta" class="sr-only"></p>

          <div class="download-options">
            <label class="select-field" for="mode">
              <span data-i18n="result.mediaType"></span>
              <select id="mode">
                <option value="video" data-i18n="result.video"></option>
                <option value="audio" data-i18n="result.audio"></option>
                <option value="image" data-i18n="result.image"></option>
              </select>
            </label>

            <label class="select-field" for="format">
              <span data-i18n="result.quality"></span>
              <select id="format">
                <option value="" data-i18n="result.bestAvailableQuality"></option>
              </select>
            </label>
          </div>

          <button id="download" class="primary-button download-button" type="button">
            <span class="button-content">
              <svg aria-hidden="true"><use href="#icon-download"></use></svg>
              <span class="button-label" data-i18n="result.download"></span>
            </span>
            <span class="download-progress" aria-hidden="true"></span>
          </button>
        </div>
      </section>
    </section>

    <section id="download-manager" class="manager-section" aria-labelledby="queue-title">
      <div class="section-heading manager-heading">
        <span class="section-label" data-i18n="queue.eyebrow"></span>
        <h2 id="queue-title" data-i18n="queue.title"></h2>
        <p data-i18n="queue.description"></p>
      </div>
      <div id="queue-empty" class="manager-empty">
        <svg aria-hidden="true"><use href="#icon-download"></use></svg>
        <strong data-i18n="queue.emptyTitle"></strong>
        <span data-i18n="queue.emptyDescription"></span>
      </div>
      <div id="download-queue" class="download-queue" aria-live="polite"></div>
    </section>

    <section id="recent-downloads" class="manager-section history-section" aria-labelledby="history-title">
      <div class="section-heading manager-heading">
        <span class="section-label" data-i18n="history.eyebrow"></span>
        <h2 id="history-title" data-i18n="history.title"></h2>
        <p data-i18n="history.description"></p>
      </div>
      <div id="history-empty" class="manager-empty">
        <svg aria-hidden="true"><use href="#icon-clock"></use></svg>
        <strong data-i18n="history.emptyTitle"></strong>
        <span data-i18n="history.emptyDescription"></span>
      </div>
      <div id="download-history" class="history-grid"></div>
    </section>

    <section class="platforms-section" aria-labelledby="platforms-title">
      <div class="section-heading">
        <span class="section-label" data-i18n="platforms.eyebrow"></span>
        <h2 id="platforms-title" data-i18n="platforms.title"></h2>
        <p data-i18n="platforms.description"></p>
      </div>

      <div class="platform-grid">
        <article class="platform-card youtube"><span class="platform-icon"><svg><use href="#icon-youtube"></use></svg></span><h3 data-i18n="platforms.youtube"></h3></article>
        <article class="platform-card tiktok"><span class="platform-icon"><svg><use href="#icon-tiktok"></use></svg></span><h3 data-i18n="platforms.tiktok"></h3></article>
        <article class="platform-card instagram"><span class="platform-icon"><svg><use href="#icon-instagram"></use></svg></span><h3 data-i18n="platforms.instagram"></h3></article>
        <article class="platform-card facebook"><span class="platform-icon"><svg><use href="#icon-facebook"></use></svg></span><h3 data-i18n="platforms.facebook"></h3></article>
        <article class="platform-card snapchat"><span class="platform-icon"><svg><use href="#icon-snapchat"></use></svg></span><h3 data-i18n="platforms.snapchat"></h3></article>
        <article class="platform-card x-social"><span class="platform-icon"><svg><use href="#icon-x"></use></svg></span><h3 data-i18n="platforms.x"></h3></article>
        <article class="platform-card pinterest"><span class="platform-icon"><svg><use href="#icon-pinterest"></use></svg></span><h3 data-i18n="platforms.pinterest"></h3></article>
        <article class="platform-card threads"><span class="platform-icon"><svg><use href="#icon-threads"></use></svg></span><h3 data-i18n="platforms.threads"></h3></article>
        <article class="platform-card reddit"><span class="platform-icon"><svg><use href="#icon-reddit"></use></svg></span><h3 data-i18n="platforms.reddit"></h3></article>
        <article class="platform-card vimeo"><span class="platform-icon"><svg><use href="#icon-vimeo"></use></svg></span><h3 data-i18n="platforms.vimeo"></h3></article>
      </div>
    </section>
  </main>

  <footer class="site-footer" data-site-footer data-root-path="."></footer>

  <script src="site-footer.js" defer></script>
  <script src="i18n/i18n.js" defer></script>
  <script src="download-manager.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
